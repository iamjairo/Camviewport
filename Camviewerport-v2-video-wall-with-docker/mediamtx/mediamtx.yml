###############################################################################
# mediamtx configuration
# Docs: https://github.com/bluenviron/mediamtx
#
# Token auth: set authMethod to jwt or internal and configure paths below.
# Stream paths are auto-created on first publish.
###############################################################################

# ── Logging ──────────────────────────────────────────────────────────────────
logLevel: info
logDestinations: [stdout]

# ── APIs ─────────────────────────────────────────────────────────────────────
api: yes
apiAddress: :9997

metrics: no
pprof: no

# ── RTSP ─────────────────────────────────────────────────────────────────────
rtsp: yes
rtspAddress: :8554
rtspEncryption: no          # set to 'optional' or 'strict' + supply certs for RTSPS
# rtspsAddress: :8322
# serverCert: /path/to/cert.pem
# serverKey: /path/to/key.pem

rtspAuthMethods: [basic]

# ── RTMP ─────────────────────────────────────────────────────────────────────
rtmp: yes
rtmpAddress: :1935
rtmpEncryption: no          # set to 'optional' for RTMPS

# ── HLS ──────────────────────────────────────────────────────────────────────
hls: yes
hlsAddress: :8888
hlsEncryption: no
hlsAlwaysRemux: no
hlsVariant: lowLatency      # lowLatency | mpegts | fmp4
hlsSegmentCount: 3
hlsSegmentDuration: 500ms
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsAllowOrigin: "*"

# ── WebRTC (WHIP ingest / WHEP playback) ─────────────────────────────────────
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no
webrtcICEServers2:
  - urls: [stun:stun.l.google.com:19302]

# ── SRT ──────────────────────────────────────────────────────────────────────
srt: yes
srtAddress: :8890

# ── Authentication ───────────────────────────────────────────────────────────
# internal = username/password list below
# jwt      = validate Bearer tokens against a JWKS endpoint
authMethod: internal

# Add your camera / publisher credentials here:
authInternalUsers:
  # Publisher (camera pushes to mediamtx):
  - user: publisher
    pass: "${MEDIAMTX_PUBLISHER_PASS:-changeme}"
    ips: []
    permissions:
      - action: publish
        path: ""
  # Reader (browser / viewer pulls):
  - user: viewer
    pass: "${MEDIAMTX_VIEWER_PASS:-changeme}"
    ips: []
    permissions:
      - action: read
        path: ""
  # Admin (API):
  - user: admin
    pass: "${MEDIAMTX_ADMIN_PASS:-changeme}"
    ips: []
    permissions:
      - action: playback
        path: ""

# ── Path defaults ─────────────────────────────────────────────────────────────
pathDefaults:
  # Allow anyone to read (override per-path if needed)
  publishUser: publisher
  publishPass: ${MEDIAMTX_PUBLISHER_PASS:-changeme}
  readUser: ""
  readPass: ""

  # Pull from source (e.g. a camera RTSP URL) if no one is publishing:
  # source: rtsp://admin:pass@192.168.1.x:554/stream

  # Record streams to disk:
  record: no
  # recordPath: /data/recordings/%path/%Y-%m-%d_%H-%M-%S-%f

# ── Example named paths ──────────────────────────────────────────────────────
paths:
  cam_front:
    source: rtsp://admin:password@192.168.1.100:554/cam/realmonitor?channel=1&subtype=0
    sourceOnDemand: yes

  cam_parking:
    source: rtsp://admin:password@192.168.1.101:554/stream1
    sourceOnDemand: yes

  cam_lobby:
    source: rtsp://admin:password@192.168.1.102:554/h264Preview_01_main
    sourceOnDemand: yes

  cam_server:
    source: rtsp://admin:password@192.168.1.103:554/stream
    sourceOnDemand: yes

  # Wildcard: accept any path pushed via RTMP/RTSP/WHIP
  "~^.*$":
    sourceOnDemand: yes
