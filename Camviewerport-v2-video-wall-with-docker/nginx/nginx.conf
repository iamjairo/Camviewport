###############################################################################
# Nginx — CamViewport reverse proxy
#   - Serves the SPA on HTTP :80 and HTTPS :443 (self-signed)
#   - Proxies go2rtc API + WHEP on /go2rtc/
#   - Proxies mediamtx HLS + WebRTC + API on /mediamtx/
#   - WebSocket upgrade support for WebRTC signalling
###############################################################################

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format  main  '$remote_addr "$request" $status $body_bytes_sent';
  access_log  /dev/stdout main;

  sendfile        on;
  tcp_nopush      on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/x-mpegURL video/MP2T;

  # ── Upstream backends ────────────────────────────────────────────────────
  upstream go2rtc_backend {
    server go2rtc:1984;
    keepalive 16;
  }

  upstream mediamtx_hls {
    server mediamtx:8888;
    keepalive 16;
  }

  upstream mediamtx_webrtc {
    server mediamtx:8889;
    keepalive 16;
  }

  upstream mediamtx_api {
    server mediamtx:9997;
    keepalive 8;
  }

  # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    location /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS main server ────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/self.crt;
    ssl_certificate_key /etc/nginx/certs/self.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ─────────────────────────────────────────────────────
    location / {
      try_files $uri $uri/ /index.html;
    }

    location /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ── go2rtc proxy  ─────────────────────────────────────────────────────
    # Web UI:  https://host/go2rtc/
    # WHEP:    https://host/go2rtc/api/whep?src=cam_front
    location /go2rtc/ {
      proxy_pass http://go2rtc_backend/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_buffering off;
      proxy_read_timeout 3600s;
    }

    # ── mediamtx HLS (m3u8 + TS segments) ───────────────────────────────
    location /mediamtx/hls/ {
      proxy_pass http://mediamtx_hls/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_buffering off;
      proxy_cache_bypass $http_upgrade;

      # CORS for HLS.js
      add_header Access-Control-Allow-Origin * always;
      add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    # ── mediamtx WebRTC / WHEP / WHIP ────────────────────────────────────
    location /mediamtx/ {
      proxy_pass http://mediamtx_webrtc/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      add_header Access-Control-Allow-Origin * always;
    }

    # ── mediamtx REST API ─────────────────────────────────────────────────
    location /mediamtx/api/ {
      proxy_pass http://mediamtx_api/;
      proxy_set_header Host $host;
    }
  }
}
