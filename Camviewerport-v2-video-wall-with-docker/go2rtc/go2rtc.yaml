###############################################################################
# go2rtc configuration
# Docs: https://github.com/AlexxIT/go2rtc
#
# Token-based auth: set api.token below (or via GO2RTC_API_TOKEN env var).
# Browser playback via WHEP: /api/whep?src=<stream_name>&token=<token>
###############################################################################

api:
  listen: ":1984"
  # Uncomment and set a strong token to protect the API + WHEP endpoint
  # token: "${GO2RTC_API_TOKEN}"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"
  # For LAN use or Docker networking — ICE candidates
  ice_servers:
    - urls: [stun:stun.l.google.com:19302]

# ─────────────────────────────────────────────────────────────────────────────
# Stream sources
#
# Format:
#   <stream_name>:
#     - <source_url>
#
# Sources can be RTSP, RTMP, HTTP MJPEG, HLS, ONVIF, USB camera, file, etc.
# The stream_name is what you enter in the CamViewport web UI.
# ─────────────────────────────────────────────────────────────────────────────
streams:
  # ── Demo / placeholder streams ─────────────────────────────────────────────
  # Replace with your real camera URLs.

  cam_front:
    - rtsp://admin:password@192.168.1.100:554/cam/realmonitor?channel=1&subtype=0

  cam_parking:
    - rtsp://admin:password@192.168.1.101:554/stream1

  cam_lobby:
    - rtsp://admin:password@192.168.1.102:554/h264Preview_01_main

  cam_server:
    - rtsp://admin:password@192.168.1.103:554/stream

  # ── RTMP ingest example ───────────────────────────────────────────────────
  # A camera can push RTMP to go2rtc, then you pull via WHEP:
  # cam_rtmp_ingest:
  #   - rtmp://

  # ── Re-stream from mediamtx ──────────────────────────────────────────────
  # cam_via_mediamtx:
  #   - rtsp://mediamtx:8554/cam_front

# ─────────────────────────────────────────────────────────────────────────────
# Log level: trace | debug | info | warn | error
# ─────────────────────────────────────────────────────────────────────────────
log:
  level: info
