; ─────────────────────────────────────────────────────────────────────────────
; camviewport.ini — video wall config for the native C/X11/mpv client
; This file is bind-mounted into the camviewport container.
; Restart the container after changes.
; ─────────────────────────────────────────────────────────────────────────────

; Key bindings
key-q = quit
key-r = reload
key-space = home
key-l = next
key-h = previous

; Global mpv options — uncomment / adjust for your GPU
; mpv-hwdec = vaapi
; mpv-gpu-api = vulkan
mpv-cache = yes
mpv-demuxer-max-bytes = 50MiB
mpv-video-latency-hacks = yes
mpv-profile = low-latency

[CAM-01]
; Replace with your real stream URLs
main = rtsp://admin:password@192.168.1.100:554/cam/realmonitor?channel=1&subtype=0
sub  = rtsp://admin:password@192.168.1.100:554/cam/realmonitor?channel=1&subtype=1

[CAM-02]
main = rtsp://admin:password@192.168.1.101:554/stream1
sub  = rtsp://admin:password@192.168.1.101:554/stream2

[CAM-03]
main = rtsp://admin:password@192.168.1.102:554/h264Preview_01_main
sub  = rtsp://admin:password@192.168.1.102:554/h264Preview_01_sub

[CAM-04]
main = rtsp://admin:password@192.168.1.103:554/stream
sub  = rtsp://admin:password@192.168.1.103:554/stream2
