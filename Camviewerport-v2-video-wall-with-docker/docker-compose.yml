###############################################################################
# CamViewport — Full Stack docker-compose
#
# Services:
#   web          — Vite/React video wall SPA served by Nginx (HTTPS self-signed)
#   go2rtc       — WebRTC / RTSP / RTMP / HTTP re-streamer (port 1984)
#   mediamtx     — WebRTC / RTSP / RTMP / HLS / SRT relay   (ports 8554/1935/8888/8889)
#   camviewport  — C/X11/mpv video wall daemon (VNC on 5900)
#
# Copy .env.example → .env and adjust before starting.
###############################################################################

version: "3.9"

networks:
  cam_net:
    driver: bridge

volumes:
  go2rtc_data:
  mediamtx_data:
  camviewport_config:

services:

  # ──────────────────────────────────────────────────────────────────────────
  # Nginx reverse proxy — self-signed TLS, proxies go2rtc & mediamtx APIs
  # ──────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: camviewport_web
    restart: unless-stopped
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    environment:
      SSL_COMMON_NAME: ${SSL_CN:-camviewport.local}
    depends_on:
      - go2rtc
      - mediamtx
    networks:
      - cam_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # go2rtc — best-in-class WebRTC re-streamer (WHEP endpoint for browser)
  #   Admin UI:  http://localhost:1984
  #   WHEP:      http://localhost:1984/api/whep?src=<stream_name>
  # ──────────────────────────────────────────────────────────────────────────
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: camviewport_go2rtc
    restart: unless-stopped
    ports:
      - "1984:1984"        # HTTP API + Web UI + WHEP
      - "8555:8555/tcp"    # WebRTC TCP (ICE)
      - "8555:8555/udp"    # WebRTC UDP (ICE)
    volumes:
      - ./go2rtc/go2rtc.yaml:/config/go2rtc.yaml:ro
      - go2rtc_data:/data
    environment:
      GO2RTC_CONFIG: /config/go2rtc.yaml
    networks:
      - cam_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1984/api/streams"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # mediamtx — multi-protocol media server
  #   RTSP:    rtsp://localhost:8554/<path>
  #   RTMP:    rtmp://localhost:1935/<path>
  #   HLS:     http://localhost:8888/<path>/index.m3u8
  #   WebRTC:  http://localhost:8889/<path>  (WHIP ingest / WHEP playback)
  #   SRT:     srt://localhost:8890
  # ──────────────────────────────────────────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: camviewport_mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"       # RTSP
      - "1935:1935"       # RTMP
      - "8888:8888"       # HLS
      - "8889:8889"       # WebRTC (WHIP/WHEP)
      - "8890:8890/udp"   # SRT
      - "9997:9997"       # API
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - mediamtx_data:/data
    networks:
      - cam_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9997/v3/paths/list"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # camviewport — C/X11/mpv-based local video wall (headless Xvfb + VNC)
  #   VNC viewer: localhost:5900  password defined by VNC_PASSWORD
  # ──────────────────────────────────────────────────────────────────────────
  camviewport:
    build:
      context: .
      dockerfile: Dockerfile.camviewport
      target: runtime
    container_name: camviewport_native
    restart: unless-stopped
    ports:
      - "${VNC_PORT:-5900}:5900"
    volumes:
      - ./camviewport/camviewport.ini:/etc/camviewport/camviewport.ini:ro
      - camviewport_config:/etc/camviewport
    environment:
      VNC_PASSWORD: ${VNC_PASSWORD:-camviewport}
      XVFB_RESOLUTION: ${XVFB_RESOLUTION:-1920x1080x24}
    networks:
      - cam_net
    profiles:
      # Run only when explicitly requested: docker compose --profile native up
      - native
